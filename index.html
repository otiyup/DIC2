<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5x5 Gridworld - Value Iteration</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Google Fonts for modern aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Gridworld Agent</h1>
            <p>Interactive Value Iteration pathfinding</p>
        </header>
        
        <div class="controls-panel">
            <div class="mode-selector">
                <h3>Edit Mode</h3>
                <label><input type="radio" name="mode" value="start" checked> Set Start</label>
                <label><input type="radio" name="mode" value="end"> Set End</label>
                <label><input type="radio" name="mode" value="block"> Set Block</label>
                <label><input type="radio" name="mode" value="clear"> Clear Cell</label>
            </div>
            
            <div class="action-buttons">
                <button id="run-btn" class="primary-btn">Compute Value Iteration</button>
                <div class="view-selector">
                    <label for="view-mode">View:</label>
                    <select id="view-mode">
                        <option value="random">Random Policy</option>
                        <option value="values">Value Function V(s)</option>
                        <option value="optimal">Optimal Policy &pi;(s)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <div id="grid" class="grid-5x5">
                <!-- Grid cells generated by JS -->
            </div>
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
