<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5x5 Gridworld - Value Iteration</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Google Fonts for modern aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Gridworld Agent</h1>
            <p>Interactive Value Iteration pathfinding</p>
        </header>
        
        <div class="controls-panel">
            <div class="mode-selector">
                <h3>Instructions</h3>
                <p id="instruction-text" style="color: var(--text-color); font-size: 0.9rem; margin: 0; min-height: 2em;">
                    Click a cell to set the <strong>Start</strong> point.
                </p>
                <button id="reset-btn" class="secondary-btn" style="margin-top: 10px;">Reset Grid</button>
            </div>
        </div>

        <div class="grid-container">
            <div id="grid" class="grid-5x5">
                <!-- Grid cells generated by JS -->
            </div>
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
